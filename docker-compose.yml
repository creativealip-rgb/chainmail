version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: atomicmail-clone:latest
    container_name: atomicmail-clone
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dokploy-network:
    external: true
